<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Secret Message Encoder</title>
<style>
  body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; }
  textarea { width: 100%; height: 120px; font-size: 15px; padding: 10px; }
  #out { width: 100%; height: 80px; font-family: monospace; font-size: 13px; padding: 10px; margin-top: 12px; }
  button { padding: 10px 20px; font-size: 15px; margin-top: 12px; cursor: pointer; }
</style>
</head>
<body>
  <h2>Encode your Level 50 secret message</h2>
  <p>Type the message you want to reveal after the player beats level 50, then click Encode. Copy the result into <code>CONFIG.SECRET_MESSAGE_BASE64</code> in <code>game.js</code>. This file is just a local tool — you never need to upload or share it.</p>
  <textarea id="input" placeholder="Type your secret ending message here..."></textarea>
  <br>
  <button onclick="encode()">Encode</button>
  <textarea id="out" readonly placeholder="Encoded string will appear here"></textarea>

  <script>
    function encode() {
      const text = document.getElementById('input').value;
      const encoded = btoa(unescape(encodeURIComponent(text)));
      document.getElementById('out').value = encoded;
    }
  </script>
</body>
</html>
